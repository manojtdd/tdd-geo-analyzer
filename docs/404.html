<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — GEO Analyzer Help</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fc; display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 48px 52px; text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,.07); max-width: 440px; width: 100%;
    }
    .icon { font-size: 52px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 800; color: #0f1623; margin-bottom: 10px; }
    p { color: #6b7280; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    a {
      display: inline-block; background: #f97316; color: #fff;
      font-weight: 700; font-size: 14px; padding: 12px 28px;
      border-radius: 8px; text-decoration: none;
    }
    a:hover { background: #ea6c0a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📄</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. Head back to the GEO Analyzer documentation.</p>
    <a href="/">Go to Help Docs</a>
  </div>
</body>
</html>
